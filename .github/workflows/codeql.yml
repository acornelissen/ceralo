name: CodeQL

# Static security analysis for the TypeScript frontend and the Rust backend.
# Runs on pushes/PRs to master and weekly. Findings appear under Security →
# Code scanning. Advisory only — it does not gate merges.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "27 3 * * 1" # Mondays, 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: autobuild

    steps:
      - uses: actions/checkout@v6

      # Rust analysis builds the Tauri crate, which needs the same system
      # libraries and toolchain as CI, plus the built frontend so tauri-build's
      # frontendDist check passes during the cargo build.
      - name: Install Tauri system dependencies
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install node and rust from mise.toml
        if: matrix.language == 'rust'
        uses: jdx/mise-action@v4

      - name: Build the frontend (for tauri-build)
        if: matrix.language == 'rust'
        run: |
          npm ci
          npm run build

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
