version: 2
updates:
  # Frontend npm dependencies (root package.json).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # @types/node tracks the pinned Node runtime (see mise.toml); bump it
      # together with the runtime, not ahead of it.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript major upgrades are deliberate (tsconfig/type changes); the
      # 6.0 auto-PR broke the build. Upgrade it manually, not via Dependabot.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Rust crates for the Tauri backend.
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by CI and the release workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
